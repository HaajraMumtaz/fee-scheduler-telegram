<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Tutoring Admin{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-brand">Tutor<span>Admin</span></div>

    <span class="nav-section">Overview</span>
    <a href="/dashboard" class="nav-link {% if active == 'dashboard' %}active{% endif %}">
      <span class="icon">◈</span> Dashboard
    </a>

    <span class="nav-section">Students</span>
    <a href="/students" class="nav-link {% if active == 'students' %}active{% endif %}">
      <span class="icon">◎</span> Unpaid Fees
    </a>

    <span class="nav-section">Finance</span>
    <a href="/payroll" class="nav-link {% if active == 'payroll' %}active{% endif %}">
      <span class="icon">◐</span> Payroll
    </a>

    <span class="nav-section">Ops</span>
    <a href="/sync" class="nav-link {% if active == 'sync' %}active{% endif %}">
      <span class="icon">↻</span> Sheet Sync
    </a>
    <a href="/cron" class="nav-link {% if active == 'cron' %}active{% endif %}">
      <span class="icon">⏱</span> Cron Jobs
    </a>

    <div style="margin-top:auto;padding:20px">
      <a href="/auth/logout" class="btn btn-ghost" style="width:100%;justify-content:center;font-size:13px">Sign out</a>
    </div>
  </nav>

  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>

<div id="toast"></div>
<script src="/static/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
