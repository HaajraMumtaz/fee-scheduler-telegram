{% extends "base.html" %}
{% block title %}Unpaid Fees — TutorAdmin{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Unpaid Fees</h1>
  <p>Students with overdue monthly payments.</p>
</div>

<div class="card">
  <div class="actions-bar">
    <div class="card-title" style="margin-bottom:0">Overdue students</div>
    <button class="btn btn-ghost btn-sm" onclick="loadUnpaidStudents()">↻ Refresh</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Student</th>
          <th>ID</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="unpaid-tbody">
        <tr><td colspan="4" style="text-align:center;color:var(--muted);padding:24px">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Mark paid modal -->
<div class="modal-overlay" id="mark-paid-modal" onclick="if(event.target===this)closeMarkPaid()">
  <div class="modal">
    <h2>Confirm Payment</h2>
    <p style="color:var(--muted);font-size:14px;margin-bottom:16px">
      Recording payment for <strong id="modal-student-name"></strong>
    </p>
    <div class="form-field">
      <label>Amount (PKR)</label>
      <input type="number" id="payment-amount" placeholder="0" min="0" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:var(--font)">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeMarkPaid()">Cancel</button>
      <button class="btn btn-success" onclick="confirmMarkPaid()">✓ Confirm Payment</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>loadUnpaidStudents();</script>
{% endblock %}
